name: Daily DeFi Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 8:00 AM Beijing time (UTC+8)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Generate report
        run: node dist/cli.js report --stdout > report.md 2> logs.txt || true
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: defi-report
          path: report.md
          
      - name: Show logs
        run: |
          echo "=== stderr logs ==="
          cat logs.txt || true
          echo ""
          echo "=== report preview ==="
          head -100 report.md || true

      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "DeFi Daily Report - ${DATE}" \
            --body-file report.md \
            --label "daily-report"
