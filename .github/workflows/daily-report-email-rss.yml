name: Daily DeFi Email + RSS Report

on:
  workflow_run:
    workflows: ["Daily DeFi Report"]
    types: [completed]

permissions:
  contents: write

jobs:
  email-rss-report:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      RSS_TITLE: ${{ vars.RSS_TITLE }}
      RSS_DESCRIPTION: ${{ vars.RSS_DESCRIPTION }}
      RSS_LINK: ${{ vars.RSS_LINK }}
      RSS_SELF_LINK: ${{ vars.RSS_SELF_LINK }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: defi-report
          path: .

      - name: Show report preview
        run: head -50 report.md

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Generate RSS
        run: node scripts/generate-rss.mjs

      - name: Commit RSS
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/rss.xml
          git commit -m "update RSS feed" || echo "no changes"
          git push

      - name: Send HTML Email
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ vars.EMAIL_SERVER }}
          server_port: ${{ vars.EMAIL_SERVER_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: "${{ vars.EMAIL_SUBJECT_PREFIX }} DeFi Daily Report"

          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}

          html_body: |
            <h2>DeFi Daily Report</h2>

            <p>The latest DeFi market report is attached.</p>

            <p>
            RSS feed:<br>
            <a href="${{ vars.RSS_SELF_LINK }}">
            ${{ vars.RSS_SELF_LINK }}
            </a>
            </p>

            <hr>

            <p>Generated automatically by GitHub Actions.</p>

          attachments: report.md
