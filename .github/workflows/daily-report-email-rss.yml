name: Daily DeFi Email + RSS Report

on:
  workflow_run:
    workflows: ["Daily DeFi Report"]
    types:
      - completed

permissions:
  contents: write

jobs:
  email-rss-report:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download report artifact (if exists)
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id
            })

            if (artifacts.artifacts.length === 0) {
              core.setFailed("No artifacts found from report workflow.")
            }

      - name: Generate RSS
        run: |
          mkdir -p docs
          node <<'EOF'
          const fs = require('fs')

          let report = "Report content not found."

          if (fs.existsSync("report.md")) {
            report = fs.readFileSync("report.md", "utf8")
          }

          const now = new Date()
          const iso = now.toISOString()
          const pubDate = now.toUTCString()

          const title = process.env.RSS_TITLE || "DeFi Daily News"
          const description = process.env.RSS_DESCRIPTION || "Automated DeFi market report"
          const siteLink = process.env.RSS_LINK || "https://github.com/AriaYD/defi-radar"
          const selfLink = process.env.RSS_SELF_LINK || "https://raw.githubusercontent.com/AriaYD/defi-radar/main/docs/rss.xml"

          function esc(s){
            return s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
          }

          const xml = `<?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0">
          <channel>
          <title>${esc(title)}</title>
          <link>${esc(siteLink)}</link>
          <description>${esc(description)}</description>
          <lastBuildDate>${pubDate}</lastBuildDate>

          <item>
          <title>DeFi Daily Report ${iso.slice(0,10)}</title>
          <link>${esc(siteLink)}</link>
          <guid>${esc(siteLink)}#${iso.slice(0,10)}</guid>
          <pubDate>${pubDate}</pubDate>
          <description><![CDATA[<pre>${report}</pre>]]></description>
          </item>

          </channel>
          </rss>`

          fs.writeFileSync("docs/rss.xml", xml)
          console.log("rss.xml generated")
          EOF

      - name: Commit RSS
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/rss.xml
          git commit -m "update RSS feed" || echo "No changes"
          git push

      - name: Send email
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ vars.EMAIL_SERVER }}
          server_port: ${{ vars.EMAIL_SERVER_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ vars.EMAIL_SUBJECT_PREFIX }} DeFi Daily Report"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Today's DeFi report is attached.

            RSS:
            ${{ vars.RSS_SELF_LINK }}
          attachments: report.md
